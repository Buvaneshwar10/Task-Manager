<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DO IT — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --border: #2a2a2a;
      --accent: #d4f53c;
      --accent-dim: #a8c030;
      --text: #f0f0f0;
      --muted: #666;
      --red: #ff4d4d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 16px 100px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,245,60,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,245,60,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 620px;
      position: relative;
      z-index: 1;
    }

    header { margin-bottom: 48px; }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 15vw, 100px);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 12px;
      letter-spacing: 0.05em;
    }

    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 32px;
      padding: 16px 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      align-items: center;
    }

    .stat { display: flex; flex-direction: column; gap: 2px; }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .progress-bar { flex: 1; display: flex; align-items: center; }

    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }

    .input-row { display: flex; margin-bottom: 8px; }
    .input-wrap { flex: 1; }

    .task-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-right: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 14px 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    .task-input:focus { border-color: var(--accent); }
    .task-input::placeholder { color: var(--muted); }

    .priority-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-right: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 0 14px;
      outline: none;
      cursor: pointer;
      letter-spacing: 0.05em;
      appearance: none;
      -webkit-appearance: none;
    }

    .add-btn {
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.1em;
      padding: 0 28px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .add-btn:hover { background: var(--accent-dim); }
    .add-btn:active { transform: scale(0.97); }

    .filters {
      display: flex;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .filter-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border-right: 1px solid var(--border);
    }

    .filter-btn:last-child { border-right: none; }
    .filter-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .filter-btn.active { background: var(--accent); color: #0e0e0e; font-weight: 500; }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      list-style: none;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      transition: background 0.2s;
      animation: slideIn 0.3s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-14px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .task-item.removing {
      animation: none;
      transition: opacity 0.25s, max-height 0.25s, padding 0.25s;
      opacity: 0;
      max-height: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      overflow: hidden;
    }

    .task-item[data-priority="high"]   { border-left-color: var(--red); }
    .task-item[data-priority="medium"] { border-left-color: #f5a623; }
    .task-item[data-priority="low"]    { border-left-color: var(--accent); }

    .task-item:hover { background: #1f1f1f; }
    .task-item.done { opacity: 0.45; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

    .check-btn {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .check-btn:hover { border-color: var(--accent); }
    .task-item.done .check-btn { background: var(--accent); border-color: var(--accent); }

    .check-icon { display: none; }
    .task-item.done .check-icon { display: block; }

    .task-text {
      flex: 1;
      font-size: 14px;
      letter-spacing: 0.01em;
      line-height: 1.4;
      word-break: break-word;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .priority-badge {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid;
    }

    .priority-badge.high   { color: var(--red);   border-color: var(--red); }
    .priority-badge.medium { color: #f5a623; border-color: #f5a623; }
    .priority-badge.low    { color: var(--accent); border-color: var(--accent); }

    .task-date { font-size: 10px; color: var(--muted); }

    .delete-btn {
      width: 28px;
      height: 28px;
      min-width: 28px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, background 0.2s;
      opacity: 0;
      font-size: 20px;
      line-height: 1;
    }

    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--red); background: rgba(255,77,77,0.1); }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px dashed var(--border);
      list-style: none;
    }

    .empty-icon {
      font-size: 32px;
      display: block;
      margin-bottom: 16px;
      opacity: 0.35;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">// task manager</div>
    <h1>DO<span>.</span><br>IT<span>.</span></h1>
    <p class="subtitle">stay focused — get it done</p>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="total-count">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="done-count">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="left-count">0</div>
      <div class="stat-label">Left</div>
    </div>
    <div class="progress-bar">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>

  <div class="input-row">
    <div class="input-wrap">
      <input class="task-input" id="task-input" type="text" placeholder="add a new task..." maxlength="120" />
    </div>
    <select class="priority-select" id="priority-select">
      <option value="low">LOW</option>
      <option value="medium" selected>MED</option>
      <option value="high">HIGH</option>
    </select>
    <button class="add-btn" id="add-btn">ADD</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="done">Done</button>
    <button class="filter-btn" data-filter="high">High</button>
  </div>

  <ul class="task-list" id="task-list"></ul>

  <div class="actions">
    <button class="clear-btn" id="clear-btn">Clear completed</button>
  </div>
</div>

<script>
  var tasks = [];
  var currentFilter = 'all';
  var idCounter = 1;

  var taskInput    = document.getElementById('task-input');
  var prioritySel  = document.getElementById('priority-select');
  var addBtn       = document.getElementById('add-btn');
  var taskList     = document.getElementById('task-list');
  var clearBtn     = document.getElementById('clear-btn');
  var totalEl      = document.getElementById('total-count');
  var doneEl       = document.getElementById('done-count');
  var leftEl       = document.getElementById('left-count');
  var progressFill = document.getElementById('progress-fill');

  function formatDate(ts) {
    var d = new Date(ts);
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate();
  }

  function addTask() {
    var text = taskInput.value.trim();
    if (!text) { taskInput.focus(); return; }
    tasks.unshift({ id: idCounter++, text: text, priority: prioritySel.value, done: false, created: Date.now() });
    taskInput.value = '';
    taskInput.focus();
    render();
  }

  function toggleTask(id) {
    for (var i = 0; i < tasks.length; i++) {
      if (tasks[i].id === id) { tasks[i].done = !tasks[i].done; break; }
    }
    render();
  }

  function deleteTask(id) {
    var li = document.querySelector('[data-id="' + id + '"]');
    if (li) {
      li.classList.add('removing');
      setTimeout(function() {
        tasks = tasks.filter(function(t) { return t.id !== id; });
        render();
      }, 260);
    }
  }

  function getFiltered() {
    if (currentFilter === 'active') return tasks.filter(function(t) { return !t.done; });
    if (currentFilter === 'done')   return tasks.filter(function(t) { return t.done; });
    if (currentFilter === 'high')   return tasks.filter(function(t) { return t.priority === 'high'; });
    return tasks;
  }

  function render() {
    var doneCount  = tasks.filter(function(t) { return t.done; }).length;
    var totalCount = tasks.length;

    totalEl.textContent = totalCount;
    doneEl.textContent  = doneCount;
    leftEl.textContent  = totalCount - doneCount;
    progressFill.style.width = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) + '%' : '0%';

    var filtered = getFiltered();
    taskList.innerHTML = '';

    if (filtered.length === 0) {
      var empty = document.createElement('li');
      empty.className = 'empty';
      empty.innerHTML = '<span class="empty-icon">&#9676;</span>' +
        (currentFilter === 'all' ? 'No tasks yet &mdash; add one above' : 'Nothing here');
      taskList.appendChild(empty);
      return;
    }

    filtered.forEach(function(task) {
      var li = document.createElement('li');
      li.className = 'task-item' + (task.done ? ' done' : '');
      li.setAttribute('data-id', task.id);
      li.setAttribute('data-priority', task.priority);

      var checkBtn = document.createElement('button');
      checkBtn.className = 'check-btn';
      checkBtn.title = 'Mark done';
      checkBtn.innerHTML = '<svg class="check-icon" width="12" height="10" viewBox="0 0 12 10" fill="none"><polyline points="1,5 4.5,8.5 11,1" stroke="#0e0e0e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      checkBtn.addEventListener('click', function() { toggleTask(task.id); });

      var textSpan = document.createElement('span');
      textSpan.className = 'task-text';
      textSpan.textContent = task.text;

      var meta = document.createElement('div');
      meta.className = 'task-meta';

      var badge = document.createElement('span');
      badge.className = 'priority-badge ' + task.priority;
      badge.textContent = task.priority;

      var dateSpan = document.createElement('span');
      dateSpan.className = 'task-date';
      dateSpan.textContent = formatDate(task.created);

      meta.appendChild(badge);
      meta.appendChild(dateSpan);

      var delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.title = 'Delete';
      delBtn.innerHTML = '&times;';
      delBtn.addEventListener('click', function() { deleteTask(task.id); });

      li.appendChild(checkBtn);
      li.appendChild(textSpan);
      li.appendChild(meta);
      li.appendChild(delBtn);
      taskList.appendChild(li);
    });
  }

  addBtn.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') addTask(); });

  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentFilter = btn.getAttribute('data-filter');
      render();
    });
  });

  clearBtn.addEventListener('click', function() {
    tasks = tasks.filter(function(t) { return !t.done; });
    render();
  });

  render();
</script>
</body>
</html>
